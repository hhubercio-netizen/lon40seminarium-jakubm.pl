<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Kalkulator Ułamków</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f0f0f0;
            padding: 20px;
        }
        h1 {
            text-align: center;
        }
        .calc {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 400px;
            margin: 0 auto;
        }
        .box {
            background: #fff;
            border: 2px solid #555;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            font-size: 18px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
        }
        input {
            width: 80px;
            font-size: 18px;
            padding: 5px;
            margin: 5px;
            text-align: center;
        }
        select {
            font-size: 18px;
            padding: 5px;
            margin: 5px;
        }
        button {
            font-size: 18px;
            padding: 10px;
            margin-top: 5px;
            cursor: pointer;
        }
        .result {
            font-weight: bold;
            font-size: 20px;
            color: #333;
        }
        .fraction-box {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
    </style>
</head>
<body>
    <h1>Kalkulator Ułamków</h1>
    <div class="calc">
        <div class="box fraction-box">
            <div>
                <input type="number" id="licznik1" placeholder="Licznik 1"><br>
                <input type="number" id="mianownik1" placeholder="Mianownik 1">
            </div>
            <select id="operator">
                <option value="+">+</option>
                <option value="-">-</option>
                <option value="*">*</option>
                <option value="/">/</option>
            </select>
            <div>
                <input type="number" id="licznik2" placeholder="Licznik 2"><br>
                <input type="number" id="mianownik2" placeholder="Mianownik 2">
            </div>
        </div>
        <div class="box">
            <button onclick="oblicz()">Oblicz</button>
        </div>
        <div class="box result" id="wynik">
            Wynik pojawi się tutaj
        </div>
    </div>

    <script>
        function skroc(licznik, mianownik) {
            function nwd(a, b) {
                return b === 0 ? a : nwd(b, a % b);
            }
            const dzielnik = nwd(Math.abs(licznik), Math.abs(mianownik));
            return [licznik / dzielnik, mianownik / dzielnik];
        }

        function oblicz() {
            let l1 = parseInt(document.getElementById("licznik1").value);
            let m1 = parseInt(document.getElementById("mianownik1").value);
            let l2 = parseInt(document.getElementById("licznik2").value);
            let m2 = parseInt(document.getElementById("mianownik2").value);
            let op = document.getElementById("operator").value;

            if (m1 === 0 || m2 === 0) {
                document.getElementById("wynik").innerText = "Mianownik nie może być 0!";
                return;
            }

            let wynikLicznik, wynikMianownik;

            switch(op) {
                case '+':
                    wynikLicznik = l1 * m2 + l2 * m1;
                    wynikMianownik = m1 * m2;
                    break;
                case '-':
                    wynikLicznik = l1 * m2 - l2 * m1;
                    wynikMianownik = m1 * m2;
                    break;
                case '*':
                    wynikLicznik = l1 * l2;
                    wynikMianownik = m1 * m2;
                    break;
                case '/':
                    if(l2 === 0){
                        document.getElementById("wynik").innerText = "Nie można dzielić przez 0!";
                        return;
                    }
                    wynikLicznik = l1 * m2;
                    wynikMianownik = m1 * l2;
                    break;
            }

            [wynikLicznik, wynikMianownik] = skroc(wynikLicznik, wynikMianownik);

            document.getElementById("wynik").innerText = `${wynikLicznik} / ${wynikMianownik}`;
        }
    </script>
</body>
</html>
