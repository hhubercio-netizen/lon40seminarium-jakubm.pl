<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Kalkulator ułamków</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 40px;
        }

        h1 {
            margin-bottom: 40px;
        }

        .table-section {
            margin-bottom: 50px;
        }

        table {
            margin: 0 auto 15px auto;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px 20px;
            border: 1px solid #ccc;
        }

        .fraction {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .fraction input {
            width: 60px;
            text-align: center;
            font-size: 18px;
        }

        .line {
            width: 60px;
            height: 2px;
            background: black;
            margin: 4px 0;
        }

        button {
            padding: 8px 20px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }

        .back-btn {
            display: inline-block;
            margin-bottom: 30px;
            text-decoration: none;
            font-size: 16px;
        }
    </style>
</head>
<body>

<h1>Kalkulator ułamków</h1>
<a href="index.html" class="back-btn">Powrót</a>

<section class="table-section">
    <h2>Wprowadź ułamki</h2>
    <table>
        <tr>
            <th>Pierwszy ułamek</th>
            <th>Drugi ułamek</th>
            <th>Wynik</th>
        </tr>
        <tr>
            <td class="fraction">
                <input type="number" id="a1" placeholder="Licznik">
                <div class="line"></div>
                <input type="number" id="b1" placeholder="Mianownik">
            </td>
            <td class="fraction">
                <input type="number" id="a2" placeholder="Licznik">
                <div class="line"></div>
                <input type="number" id="b2" placeholder="Mianownik">
            </td>
            <td class="fraction">
                <input type="number" id="r1" readonly>
                <div class="line"></div>
                <input type="number" id="r2" readonly>
            </td>
        </tr>
    </table>
    <button onclick="dodawanie()">Dodawanie</button>
    <button onclick="odejmowanie()">Odejmowanie</button>
    <button onclick="mnozenie()">Mnożenie</button>
    <button onclick="dzielenie()">Dzielenie</button>
</section>

<script>
    // Funkcja skracająca ułamek
    function skracanie(licznik, mianownik) {
        function nwd(a, b) {
            return b === 0 ? Math.abs(a) : nwd(b, a % b);
        }
        let gcd = nwd(licznik, mianownik);
        return [licznik / gcd, mianownik / gcd];
    }

    function pobierzUlamki() {
        let a1 = document.getElementById("a1").value;
        let b1 = document.getElementById("b1").value;
        let a2 = document.getElementById("a2").value;
        let b2 = document.getElementById("b2").value;

        if (a1 === "" || b1 === "" || a2 === "" || b2 === "") {
            alert("Wszystkie pola muszą być wypełnione!");
            return null;
        }

        a1 = parseInt(a1);
        b1 = parseInt(b1);
        a2 = parseInt(a2);
        b2 = parseInt(b2);

        if (b1 === 0 || b2 === 0) {
            alert("Mianownik nie może być zerem!");
            return null;
        }

        return [a1, b1, a2, b2];
    }

    function wyswietlWynik(licznik, mianownik) {
        [licznik, mianownik] = skracanie(licznik, mianownik);
        document.getElementById("r1").value = licznik;
        document.getElementById("r2").value = mianownik;
    }

    function dodawanie() {
        let ulamki = pobierzUlamki();
        if (!ulamki) return;
        let [a1, b1, a2, b2] = ulamki;
        let licznik = a1 * b2 + a2 * b1;
        let mianownik = b1 * b2;
        wyswietlWynik(licznik, mianownik);
    }

    function odejmowanie() {
        let ulamki = pobierzUlamki();
        if (!ulamki) return;
        let [a1, b1, a2, b2] = ulamki;
        let licznik = a1 * b2 - a2 * b1;
        let mianownik = b1 * b2;
        wyswietlWynik(licznik, mianownik);
    }

    function mnozenie() {
        let ulamki = pobierzUlamki();
        if (!ulamki) return;
        let [a1, b1, a2, b2] = ulamki;
        let licznik = a1 * a2;
        let mianownik = b1 * b2;
        wyswietlWynik(licznik, mianownik);
    }

    function dzielenie() {
        let ulamki = pobierzUlamki();
        if (!ulamki) return;
        let [a1, b1, a2, b2] = ulamki;
        if (a2 === 0) {
            alert("Nie można dzielić przez zero!");
            return;
        }
        let licznik = a1 * b2;
        let mianownik = b1 * a2;
        if (mianownik === 0) {
            alert("Wynik ma mianownik 0!");
            return;
        }
        wyswietlWynik(licznik, mianownik);
    }
</script>

</body>
</html>
