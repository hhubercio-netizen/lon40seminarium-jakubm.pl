<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Kalkulator Ułamków</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #f0f0f0;
        }
        h1 {
            text-align: center;
        }
        .calc {
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            width: 300px;
            margin: 0 auto;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        input, select, button {
            margin: 5px 0;
            padding: 5px;
            width: 100%;
            font-size: 16px;
        }
        .result {
            margin-top: 10px;
            font-weight: bold;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>Kalkulator Ułamków</h1>
    <div class="calc">
        <input type="number" id="licznik1" placeholder="Licznik 1">
        <input type="number" id="mianownik1" placeholder="Mianownik 1">
        <select id="operator">
            <option value="+">Dodaj</option>
            <option value="-">Odejmij</option>
            <option value="*">Pomnóż</option>
            <option value="/">Podziel</option>
        </select>
        <input type="number" id="licznik2" placeholder="Licznik 2">
        <input type="number" id="mianownik2" placeholder="Mianownik 2">
        <button onclick="oblicz()">Oblicz</button>
        <div class="result" id="wynik"></div>
    </div>

    <script>
        // Funkcja do skracania ułamków
        function skroc(licznik, mianownik) {
            function nwd(a, b) {
                return b === 0 ? a : nwd(b, a % b);
            }
            const dzielnik = nwd(Math.abs(licznik), Math.abs(mianownik));
            return [licznik / dzielnik, mianownik / dzielnik];
        }

        function oblicz() {
            let l1 = parseInt(document.getElementById("licznik1").value);
            let m1 = parseInt(document.getElementById("mianownik1").value);
            let l2 = parseInt(document.getElementById("licznik2").value);
            let m2 = parseInt(document.getElementById("mianownik2").value);
            let op = document.getElementById("operator").value;

            if (m1 === 0 || m2 === 0) {
                document.getElementById("wynik").innerText = "Mianownik nie może być 0!";
                return;
            }

            let wynikLicznik, wynikMianownik;

            switch(op) {
                case '+':
                    wynikLicznik = l1 * m2 + l2 * m1;
                    wynikMianownik = m1 * m2;
                    break;
                case '-':
                    wynikLicznik = l1 * m2 - l2 * m1;
                    wynikMianownik = m1 * m2;
                    break;
                case '*':
                    wynikLicznik = l1 * l2;
                    wynikMianownik = m1 * m2;
                    break;
                case '/':
                    if(l2 === 0){
                        document.getElementById("wynik").innerText = "Nie można dzielić przez 0!";
                        return;
                    }
                    wynikLicznik = l1 * m2;
                    wynikMianownik = m1 * l2;
                    break;
            }

            // Skracanie wyniku
            [wynikLicznik, wynikMianownik] = skroc(wynikLicznik, wynikMianownik);

            document.getElementById("wynik").innerText = 
                `Wynik: ${wynikLicznik}/${wynikMianownik}`;
        }
    </script>
</body>
</html>
